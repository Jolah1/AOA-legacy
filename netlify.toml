# Netlify build configuration for the AOA Legacy Concepts web version.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Bundle nodemailer along with our function.
  external_node_modules = []

# Single-page app fallback: every route serves index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Reasonable security headers for the deployed site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
